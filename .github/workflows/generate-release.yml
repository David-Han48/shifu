name: Auto Generate Release Log

on:
  workflow_dispatch:
    inputs:
      tag_name:
        required: true
        type: string
      previous_tag_name:
        required: true
        type: string
      target_commitish:
        required: true
        type: string
  schedule:
    - cron: '30 15 * * 1' # 周一下午 15:30
    - cron: '30 15 * * 4' # 周四下午 15:30

permissions:
  contents: write
  pull-requests: write

jobs:
  generate_changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-go@v4
        with:
          go-version: "1.22.x"
      - name: get latest tag
        id: get_latest_tag
        run: | # Unit test failed at my local machine: "git rev-list --tags --max-count=1" is null
          latest_tag=$(git describe --tags `git rev-list --tags --max-count=1`)
          echo "::set-output name=LATEST_TAG::${latest_tag}"
      - name: set version # manually
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "VERSION=$(echo "${{ github.event.inputs.tag_name }}" | cut -d '-' -f1)" >> "$GITHUB_ENV"
          echo "PREVIOUS_TAG=$(echo "${{ github.event.inputs.previous_tag_name }}" | cut -d '-' -f1)" >> "$GITHUB_ENV"
        env:
          GITHUB_ENV: ${{ env.GITHUB_ENV }}
      - name: parse env (for scheduled runs)
        if: github.event_name != 'workflow_dispatch'
        run: |
          current_tag="${{ steps.get_latest_tag.outputs.LATEST_TAG }}"
          current_version=$(echo "${current_tag}" | cut -d'.' -f2)
          next_version=$((current_version + 1))
          new_tag="v0.${next_version}.0"
          echo "VERSION=${new_tag}" >> "$GITHUB_ENV"
          echo "PREVIOUS_TAG=${current_tag}" >> "$GITHUB_ENV"

      - name: generate changelog
        # if: github.event_name == 'workflow_dispatch'
        run: |
          set -e
          tag_name="${{ github.event.inputs.tag_name || env.VERSION }}"
          previous_tag_name="${{ github.event.inputs.previous_tag_name || env.PREVIOUS_TAG }}"
          target_commitish="${{ github.event.inputs.target_commitish || 'main' }}"
          response=$(curl -L \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          https://api.github.com/repos/Edgenesis/shifu/releases/generate-notes \
          -d '{"tag_name":"'"${tag_name}"'","target_commitish":"'"${target_commitish}"'","previous_tag_name":"'"${previous_tag_name}"'"}')
          response=$(echo "$response" | sed 's/^```//;s/```$//')
          echo $response
          go run tools/release/release.go "$response"
        env:
          AZURE_OPENAI_APIKEY: ${{ secrets.AZURE_OPENAI_APIKEY }}
          AZURE_OPENAI_HOST: ${{ secrets.AZURE_OPENAI_HOST }}
          DEPLOYMENT_NAME: ${{secrets.DEPLOYMENT_NAME}}
          GITHUB_ENV: ${{ env.GITHUB_ENV }}
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: add changelog for ${{env.VERSION}}
          title: add changelog for ${{env.VERSION}}
          body: add changelog for ${{env.VERSION}}
          branch: changelog-${{env.VERSION}}
          base: main
